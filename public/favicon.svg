<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0D0E16"/>
  
  <!-- Outer border glow -->
  <rect x="1" y="1" width="30" height="30" rx="7" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.6"/>

  <!-- CPU chip body -->
  <rect x="9" y="9" width="14" height="14" rx="2" fill="#1a1a2e" stroke="#00E5FF" stroke-width="1.2"/>

  <!-- CPU center core -->
  <rect x="12" y="12" width="8" height="8" rx="1" fill="#00E5FF" fill-opacity="0.15" stroke="#00E5FF" stroke-width="0.8"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#A3FF12"/>

  <!-- CPU pins - top -->
  <line x1="12" y1="9" x2="12" y2="6" stroke="#00E5FF" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="9" x2="16" y2="6" stroke="#00E5FF" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20" y1="9" x2="20" y2="6" stroke="#00E5FF" stroke-width="1.2" stroke-linecap="round"/>

  <!-- CPU pins - bottom -->
  <line x1="12" y1="23" x2="12" y2="26" stroke="#00E5FF" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="23" x2="16" y2="26" stroke="#00E5FF" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20" y1="23" x2="20" y2="26" stroke="#00E5FF" stroke-width="1.2" stroke-linecap="round"/>

  <!-- CPU pins - left -->
  <line x1="9" y1="12" x2="6" y2="12" stroke="#8B5CF6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="9" y1="16" x2="6" y2="16" stroke="#8B5CF6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="9" y1="20" x2="6" y2="20" stroke="#8B5CF6" stroke-width="1.2" stroke-linecap="round"/>

  <!-- CPU pins - right -->
  <line x1="23" y1="12" x2="26" y2="12" stroke="#8B5CF6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="23" y1="16" x2="26" y2="16" stroke="#8B5CF6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="23" y1="20" x2="26" y2="20" stroke="#8B5CF6" stroke-width="1.2" stroke-linecap="round"/>
</svg>
